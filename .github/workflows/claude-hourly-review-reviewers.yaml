name: claude-hourly-review-reviewers
# Runner versions pinned; see ci.yaml header comment for rationale.

# Hourly analysis of Claude CI session logs — identifies behavioral problems,
# skill gaps, and workflow issues across all Claude-powered CI runs.
on:
  schedule:
    # Run at :47 past every hour (off-peak minute)
    - cron: '47 * * * *'
  workflow_dispatch:

# Consistent with ci.yaml for cache compatibility
env:
  CARGO_TERM_COLOR: always
  CLICOLOR_FORCE: 1
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  review-reviewers:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          # Use bot token so pushed commits trigger CI workflows
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 🔧 Setup build tools
        uses: ./.github/actions/claude-setup

      - name: 🤖 Run Claude Code to review reviewers
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          additional_permissions: |
            actions: read

          prompt: |
            You are running as an hourly job that reviews the behavior of all Claude-powered CI workflows from the past hour. Your goal is to identify behavioral problems, skill gaps, and workflow issues — then create issues and/or PRs to fix them.

            ## Step 1: Find recent Claude CI runs

            Run `.github/scripts/list-recent-runs.sh` to get a JSON array of recently completed Claude CI runs (filters out in-progress runs and keeps only those that finished in the past hour — see script comments for details).

            If the output is an empty array, report "no runs to review" and exit.

            ## Step 2: Download session logs

            For each run found, download the session log artifact:

            ```
            gh run download <run-id> --name claude-session-logs --dir /tmp/logs/<run-id>/
            ```

            Some runs may not have artifacts (e.g., skipped runs). That's fine — skip them.

            ## Step 3: Analyze session logs

            For each session log, analyze using jq extraction and gap analysis:
            - Find JSONL files: `find /tmp/logs/ -name '*.jsonl' -type f`
            - Extract conversation turns: `jq -c 'select(.type == "assistant" or .type == "tool_result")' < file.jsonl`
            - Extract tool calls: `jq -c 'select(.type == "assistant") | .message.content[]? | select(.type == "tool_use") | {tool: .name, input: .input}' < file.jsonl`
            - Look for tool calls, decisions, and outcomes
            - Trace decision chains: what did Claude decide, what evidence did it use, what was the outcome?

            ## Step 4: Cross-check review sessions against PR outcomes

            For `claude-review` runs, compare what the bot said against what happened next on the PR. Get the PR number from the run's head branch:

            ```
            HEAD_BRANCH=$(gh run view <run-id> --json headBranch --jq '.headBranch')
            PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --state all --json number --jq '.[0].number')
            ```

            Then check:
            - **Subsequent commits**: Were files removed, reverted, or fixed after the review? If the author undid something the bot approved without comment, the bot missed it.
            - **Human review comments**: Did human reviewers flag issues the bot didn't? These are gaps in the review process.

            This is the strongest signal — it shows what the reviewer actually missed, not just whether it followed process.

            **Important**: Although you only look at runs from the past hour, always pull in the **full context** of the PR or issue when assessing a session. Read the complete PR description, all comments, all reviews, and all commits — not just the ones from the past hour. You need the full history to judge whether the bot's response was appropriate.

            ## Step 5: Identify problems

            Compare each session against CLAUDE.md and project conventions. Flag anything where Claude's behavior diverged from the guidelines or produced a poor outcome. Include findings from the cross-check in Step 4.

            ## Step 6: Check for existing issues and PRs (deduplication)

            Because this job runs hourly, deduplication is critical. Before creating any new issue or PR, thoroughly check for existing ones that cover the same problem:

            ```
            gh issue list --state open --label claude-behavior --json number,title,body
            gh issue list --state open --json number,title,body
            gh pr list --state open --json number,title,headRefName,body
            ```

            For each finding, search issue titles AND bodies for related keywords. If an existing issue or PR already covers the same behavioral problem — even partially or with different wording — do NOT create a duplicate. Only comment on an existing issue if you have material new cases that would change the approach to fixing it or increase its prioritization (e.g., the same bug manifesting in a new workflow, or evidence that the impact is worse than originally reported). Do NOT comment with progress updates, fix-PR status, or re-statements of evidence already in the issue.

            Also check recently closed issues (past 7 days) to avoid re-filing problems that were already addressed:
            ```
            gh issue list --state closed --label claude-behavior --json number,title,closedAt --limit 30
            ```

            ## Step 7: Report findings

            For each problem found:
            1. **Create a GitHub issue** with label `claude-behavior`:
               - Title: Clear description of the behavioral problem
               - Body: Include the run ID, specific log excerpts showing the problem, analysis of root cause, and suggested fix
               - Use `gh issue create`

            2. **For actionable fixes** (skill edits, workflow tweaks, CLAUDE.md updates):
               - Create a branch: `git checkout -b hourly/review-${{ github.run_id }}`
               - Make the changes
               - Commit and push
               - Create a PR referencing the issue

            ## Step 8: Summary

            If no problems were found, report "all clear" with summary statistics:
            - Number of runs analyzed
            - Number of sessions reviewed
            - Brief quality assessment

          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
